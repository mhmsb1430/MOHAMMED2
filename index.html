<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>خطة قرآنية</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Recharts -->
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
    
    * { font-family: 'IBM Plex Sans Arabic', sans-serif; }
    body { background: #081F34; margin: 0; padding: 0; color: #F7F9FA; }
    
    .khittah-scrollbar::-webkit-scrollbar { width: 6px; }
    .khittah-scrollbar::-webkit-scrollbar-thumb { background: #204970; border-radius: 999px; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); }
    button, input, select { transition: background-color 180ms ease, border-color 180ms ease, color 180ms ease, opacity 180ms ease, transform 120ms ease; }
    button:active { transform: scale(0.97); }
    
    .khittah-fade { animation: khittahFade 320ms cubic-bezier(0.22, 1, 0.36, 1); }
    @keyframes khittahFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    
    .khittah-view-fade { animation: khittahViewFade 280ms cubic-bezier(0.22, 1, 0.36, 1); }
    @keyframes khittahViewFade { from { opacity: 0; transform: scale(0.99); } to { opacity: 1; transform: scale(1); } }
    
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
    
    .print-only { display: none; }
    @page { size: portrait; margin: 12mm; }
    @media print {
      body { background: #fff !important; }
      .no-print { display: none !important; }
      .print-only { display: block !important; width: 100% !important; height: auto !important; overflow: visible !important; }
      .khittah-report-row { break-inside: avoid; }
      table { page-break-inside: auto; }
      thead { display: table-header-group; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

    if (!window.storage) {
      window.storage = {
        get: async (key) => {
          const val = localStorage.getItem(key);
          return val ? { value: val } : null;
        },
        set: async (key, value) => {
          localStorage.setItem(key, value);
        }
      };
    }

    const Icon = ({ name, size = 24, color = "currentColor", className = "", style = {} }) => {
      const iconRef = React.useRef(null);
      useEffect(() => {
        if (iconRef.current && window.lucide) {
          window.lucide.createIcons({ attrs: { class: className }, nameAttr: 'data-lucide', root: iconRef.current.parentElement });
        }
      }, [name, size, color, className]);
      return <i ref={iconRef} data-lucide={name} style={{ width: size, height: size, color: color, display: "inline-block", ...style }}></i>;
    };

    const BookOpen = (p) => <Icon name="book-open" {...p} />;
    const Plus = (p) => <Icon name="plus" {...p} />;
    const Check = (p) => <Icon name="check" {...p} />;
    const X = (p) => <Icon name="x" {...p} />;
    const Flame = (p) => <Icon name="flame" {...p} />;
    const TrendingUp = (p) => <Icon name="trending-up" {...p} />;
    const Trash2 = (p) => <Icon name="trash-2" {...p} />;
    const StickyNote = (p) => <Icon name="sticky-note" {...p} />;
    const ChevronDown = (p) => <Icon name="chevron-down" {...p} />;
    const Loader2 = (p) => <Icon name="loader-2" {...p} />;
    const Calendar = (p) => <Icon name="calendar" {...p} />;
    const ArrowRight = (p) => <Icon name="arrow-right" {...p} />;
    const RotateCcw = (p) => <Icon name="rotate-ccw" {...p} />;
    const Layers = (p) => <Icon name="layers" {...p} />;
    const FileDown = (p) => <Icon name="file-down" {...p} />;
    const Home = (p) => <Icon name="home" {...p} />;
    const Eye = (p) => <Icon name="eye" {...p} />;
    const Share2 = (p) => <Icon name="share-2" {...p} />;

    const BUILD_TAG = "build-48-fixed";
    const C = {
      ink: "#081F34",           
      panel: "#0F2B45",         
      panelLight: "#163858",    
      panelLighter: "#204970",  
      gold: "#C2A366",          
      goldSoft: "#F0E4CE",      
      goldDim: "#8C7B58",       
      parchment: "#F7F9FA",     
      parchmentDim: "#D0DCE5",  
      sage: "#3B9268",          
      brick: "#CA5D48",         
      muted: "#7B96B0",         
    };
    const SHADOW = "rgba(2, 10, 18, 0.4)";

    const WEEKDAYS = [
      { i: 6, label: "السبت" }, { i: 0, label: "الأحد" }, { i: 1, label: "الاثنين" },
      { i: 2, label: "الثلاثاء" }, { i: 3, label: "الأربعاء" }, { i: 4, label: "الخميس" }, { i: 5, label: "الجمعة" },
    ];

    const PA = [null,{"page":1,"surahStart":1,"ayahStart":1,"surahEnd":1,"ayahEnd":7,"ayahCount":7,"juzStart":1,"juzEnd":1,"hizbStart":1,"hizbEnd":1,"rubStart":1,"rubEnd":1},{"page":2,"surahStart":2,"ayahStart":1,"surahEnd":2,"ayahEnd":5,"ayahCount":5,"juzStart":1,"juzEnd":1,"hizbStart":1,"hizbEnd":1,"rubStart":1,"rubEnd":1},{"page":3,"surahStart":2,"ayahStart":6,"surahEnd":2,"ayahEnd":16,"ayahCount":11,"juzStart":1,"juzEnd":1,"hizbStart":1,"hizbEnd":1,"rubStart":1,"rubEnd":1},{"page":4,"surahStart":2,"ayahStart":17,"surahEnd":2,"ayahEnd":24,"ayahCount":8,"juzStart":1,"juzEnd":1,"hizbStart":1,"hizbEnd":1,"rubStart":1,"rubEnd":1},{"page":5,"surahStart":2,"ayahStart":25,"surahEnd":2,"ayahEnd":29,"ayahCount":5,"juzStart":1,"juzEnd":1,"hizbStart":1,"hizbEnd":1,"rubStart":1,"rubEnd":2}];
    
    const SURAH_NAMES = [null,
      "الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
      "هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه",
      "الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم",
      "لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر",
      "فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق",
      "الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة",
      "الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج",
      "نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس",
      "التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد",
      "الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات",
      "القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر",
      "المسد","الإخلاص","الفلق","الناس"
    ];

    function pageInfo(n) { return PA[n] || { page: n, surahStart: 1, ayahStart: 1, surahEnd: 1, ayahEnd: 7, ayahCount: 7, juzStart: 1, juzEnd: 1 }; }
    
    function juzLabel(fromPage, toPage) {
      const a = pageInfo(fromPage);
      const b = pageInfo(toPage);
      if (!a || !b) return "";
      if (a.juzStart === b.juzEnd) return `الجزء ${a.juzStart}`;
      return `الأجزاء ${a.juzStart}-${b.juzEnd}`;
    }

    const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    const toDateStr = (d) => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    };
    const todayStr = () => toDateStr(new Date());
    const fmtDate = (s) => new Date(s + "T00:00:00").toLocaleDateString("ar-SA", { weekday: "short", day: "numeric", month: "short" });

    function Rub({ size = 18, color = C.gold, opacity = 1, className = "" }) {
      return (
        <svg width={size} height={size} viewBox="0 0 100 100" className={className} style={{ opacity }}>
          <g fill="none" stroke={color} strokeWidth="4" strokeLinejoin="round">
            <polygon points="50,4 62,30 90,20 70,42 96,50 70,58 90,80 62,70 50,96 38,70 10,80 30,58 4,50 30,42 10,20 38,30" />
          </g>
        </svg>
      );
    }

    function Divider() {
      return (
        <div className="flex items-center gap-3 py-2" aria-hidden="true">
          <div className="h-px flex-1" style={{ background: `linear-gradient(to left, ${C.panelLighter}, transparent)` }} />
          <Rub size={12} color={C.gold} opacity={0.6} />
          <div className="h-px flex-1" style={{ background: `linear-gradient(to right, ${C.panelLighter}, transparent)` }} />
        </div>
      );
    }

    function NumberStepper({ label, value, onChange, min = 0, max = Infinity, step = 1, hint }) {
      const round = (v) => Math.round(v / step) * step;
      const dec = () => onChange(Math.max(min, round(value - step)));
      const inc = () => onChange(Math.min(max, round(value + step)));
      return (
        <div>
          <label className="block text-xs font-medium mb-1.5" style={{ color: C.muted }}>{label}</label>
          <div className="flex items-center gap-2">
            <button type="button" onClick={dec} className="w-10 h-10 rounded-xl flex items-center justify-center text-lg font-semibold shrink-0 transition hover:opacity-80 active:scale-95" style={{ background: C.ink, border: `1px solid ${C.panelLighter}`, color: C.parchment }}>−</button>
            <input type="number" value={value} min={min} max={max} step={step} onChange={(e) => onChange(Number(e.target.value))} className="flex-1 min-w-0 text-center rounded-xl px-2 py-2.5 text-sm font-semibold outline-none transition focus:border-gold" style={{ background: C.ink, color: C.parchment, border: `1px solid ${C.panelLighter}` }} />
            <button type="button" onClick={inc} className="w-10 h-10 rounded-xl flex items-center justify-center text-lg font-semibold shrink-0 transition hover:opacity-80 active:scale-95" style={{ background: C.ink, border: `1px solid ${C.panelLighter}`, color: C.parchment }}>+</button>
          </div>
          {hint && <div className="text-[11px] mt-1.5" style={{ color: C.muted }}>{hint}</div>}
        </div>
      );
    }

    function distributeUnits(total, n) {
      const amounts = new Array(n).fill(0);
      if (total <= 0 || n <= 0) return amounts;
      if (total >= n) {
        const base = Math.floor(total / n);
        const rem = total % n;
        for (let i = 0; i < n; i++) amounts[i] = base + (i < rem ? 1 : 0);
      } else {
        for (let k = 0; k < total; k++) amounts[k] = 1;
      }
      return amounts;
    }

    function buildDates(startDate, durationDays, offDays) {
      const days = [];
      let cur = new Date(startDate + "T00:00:00");
      let guard = 0;
      while (days.length < durationDays && guard < durationDays * 4 + 30) {
        const dow = cur.getDay();
        if (!offDays.includes(dow)) days.push(toDateStr(cur));
        cur.setDate(cur.getDate() + 1);
        guard++;
      }
      return days;
    }

    function generateSchedule({ totalUnits, durationDays, startDate, offDays, startPage }) {
      const days = buildDates(startDate, durationDays, offDays);
      const n = days.length || 1;
      const startHp = ((startPage || 1) - 1) * 2 + 1;
      const totalHalf = Math.max(0, Math.round(totalUnits * 2));
      const amounts = distributeUnits(totalHalf, n);
      let cursor = startHp;
      let coveredEnd = startHp - 1;
      const result = [];
      days.forEach((date, i) => {
        const halfAmount = amounts[i];
        if (halfAmount <= 0) return;
        const from = cursor;
        const to = Math.min(cursor + halfAmount - 1, 1208);
        cursor += halfAmount;
        coveredEnd = to;
        result.push({ id: uid(), date, from, to, amount: halfAmount / 2, status: "pending", note: "" });
      });

      return result;
    }

    const SURAH_AYAH = [
      null, 7, 286, 200, 176, 120, 165, 206, 75, 129, 109, 123, 111, 43, 52, 99, 128, 111, 110, 98, 135,
      112, 78, 118, 64, 77, 227, 93, 88, 69, 60, 34, 30, 73, 54, 45, 83, 182, 88, 75, 85, 54, 53, 89, 59, 37, 35, 38, 29, 18, 45,
      60, 49, 62, 55, 78, 96, 29, 22, 24, 13, 14, 11, 11, 18, 12, 12, 30, 52, 52, 44, 28, 28, 20, 56, 40, 31, 50, 40, 46, 42,
      29, 19, 36, 25, 22, 17, 19, 26, 30, 20, 15, 21, 11, 8, 8, 19, 5, 8, 8, 11, 11, 8, 3, 9, 5, 4, 7, 3, 6, 3, 5, 4, 5, 6,
    ];

    const pageOfHp = (hp) => Math.max(1, Math.min(604, Math.ceil(hp / 2)));

    function halfPageShortLabel(hp) {
      const page = pageOfHp(hp);
      return hp % 2 === 1 ? `النصف الأول من صفحة ${page}` : `النصف الثاني من صفحة ${page}`;
    }

    function halfPageMainLabel(fromHp, toHp) {
      if (fromHp === toHp) return halfPageShortLabel(fromHp);
      const fp = pageOfHp(fromHp); const tp = pageOfHp(toHp);
      return fp === tp ? `صفحة ${fp}` : `من صفحة ${fp} إلى ${tp}`;
    }

    function halfPageRangeLabel(fromHp, toHp) {
      const fp = pageOfHp(fromHp);
      const tp = pageOfHp(toHp);
      return `من صفحة ${fp} إلى صفحة ${tp}`;
    }

    async function loadPlans() { try { const res = await window.storage.get("plans"); return res ? JSON.parse(res.value) : []; } catch { return []; } }
    async function savePlans(plans) { try { await window.storage.set("plans", JSON.stringify(plans)); } catch {} }
    async function loadActiveId() { try { const res = await window.storage.get("activeId"); return res ? res.value : null; } catch { return null; } }
    async function saveActiveId(id) { try { await window.storage.set("activeId", id || ""); } catch {} }

    function ProgressRing({ pct, size = 120 }) {
      const stroke = 9; const r = (size - stroke) / 2; const c = 2 * Math.PI * r;
      const offset = c - (Math.min(Math.max(pct, 0), 100) / 100) * c;
      return (
        <div className="relative shrink-0" style={{ width: size, height: size }}>
          <svg width={size} height={size} className="-rotate-90">
            <circle cx={size / 2} cy={size / 2} r={r} stroke={C.panelLighter} strokeWidth={stroke} fill="none" />
            <circle cx={size / 2} cy={size / 2} r={r} stroke={C.gold} strokeWidth={stroke} fill="none" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset} style={{ transition: "stroke-dashoffset 800ms ease" }} />
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <span className="text-2xl font-extrabold tracking-tight" style={{ color: C.parchment, fontFamily: "'Aref Ruqaa', serif" }}>{pct}%</span>
            <span className="text-[10px] font-medium mt-0.5" style={{ color: C.muted }}>مكتمل</span>
          </div>
        </div>
      );
    }

    function CreatePlanModal({ onClose, onCreate }) {
      const [title, setTitle] = useState("");
      const [startPage, setStartPage] = useState(1);
      const [stopPage, setStopPage] = useState(30);
      const [durationDays, setDurationDays] = useState(30);
      const [startDate, setStartDate] = useState(todayStr());

      const submit = () => {
        const clampedTotal = Math.max(1, stopPage - startPage + 1);
        const schedule = generateSchedule({ totalUnits: clampedTotal, durationDays, startDate, offDays: [5], startPage });
        onCreate({
          id: uid(), title: title.trim() || "خطة حفظ", type: "حفظ", direction: "forward",
          startPage, totalUnits: clampedTotal, durationDays, startDate, offDays: [5], schedule, createdAt: Date.now(),
        });
      };

      return (
        <div className="fixed inset-0 z-50 overflow-y-auto khittah-view-fade" style={{ background: C.ink }} dir="rtl">
          <header className="px-5 py-4 flex items-center justify-between border-b backdrop-blur-md" style={{ borderColor: C.panelLighter }}>
            <h2 className="text-lg font-bold" style={{ color: C.goldSoft, fontFamily: "'Aref Ruqaa', serif" }}>خطة قرآنية جديدة</h2>
            <button onClick={onClose} className="p-2 rounded-xl hover:bg-white/5 transition"><X size={20} color={C.muted} /></button>
          </header>

          <main className="max-w-xl mx-auto px-4 pt-6 pb-28 space-y-4">
            <div>
              <label className="block text-xs font-medium mb-1.5" style={{ color: C.goldSoft }}>اسم الخطة</label>
              <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="مثال: ختمة حفظ في شهرين" className="w-full rounded-2xl px-4 py-3 text-sm font-bold outline-none" style={{ background: C.panel, color: C.parchment, border: `1.5px solid ${C.gold}` }} />
            </div>

            <div className="rounded-2xl p-4 space-y-4" style={{ background: C.panel, border: `1px solid ${C.panelLighter}` }}>
              <NumberStepper label="من صفحة" value={startPage} onChange={(v) => setStartPage(Math.min(604, Math.max(1, v)))} min={1} max={604} />
              <NumberStepper label="إلى صفحة" value={stopPage} onChange={(v) => setStopPage(Math.min(604, Math.max(startPage, v)))} min={startPage} max={604} />
            </div>

            <div className="rounded-2xl p-4 grid grid-cols-2 gap-3" style={{ background: C.panel, border: `1px solid ${C.panelLighter}` }}>
              <NumberStepper label="مدة الخطة (أيام)" value={durationDays} onChange={(v) => setDurationDays(Math.max(1, v))} min={1} />
              <div>
                <label className="block text-xs font-medium mb-1.5" style={{ color: C.goldSoft }}>تاريخ البداية</label>
                <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-sm outline-none" style={{ background: C.ink, color: C.parchment, border: `1px solid ${C.panelLighter}` }} />
              </div>
            </div>

            <button onClick={submit} className="w-full rounded-xl py-3 text-sm font-bold transition mt-4" style={{ background: C.gold, color: C.ink }}>إنشاء الخطة</button>
          </main>
        </div>
      );
    }

    function QuranKhittahApp() {
      const [plans, setPlans] = useState([]);
      const [activeId, setActiveId] = useState(null);
      const [loading, setLoading] = useState(true);
      const [showCreate, setShowCreate] = useState(false);

      useEffect(() => {
        (async () => {
          const [p, a] = await Promise.all([loadPlans(), loadActiveId()]);
          setPlans(p);
          setActiveId(a && p.find((x) => x.id === a) ? a : p[0]?.id || null);
          setLoading(false);
        })();
      }, []);

      const persist = useCallback(async (nextPlans, nextActive) => {
        await savePlans(nextPlans);
        if (nextActive !== undefined) await saveActiveId(nextActive);
      }, []);

      const activePlan = useMemo(() => plans.find((p) => p.id === activeId) || null, [plans, activeId]);

      const createPlan = (plan) => {
        const next = [...plans, plan];
        setPlans(next); setActiveId(plan.id); setShowCreate(false); persist(next, plan.id);
      };

      const updateDay = (planId, dayId, patch) => {
        const next = plans.map((p) => {
          if (p.id !== planId) return p;
          return { ...p, schedule: p.schedule.map((d) => (d.id === dayId ? { ...d, ...patch } : d)) };
        });
        setPlans(next); persist(next);
      };

      const stats = useMemo(() => {
        if (!activePlan) return null;
        const s = activePlan.schedule;
        const done = s.filter((d) => d.status === "done");
        const completedUnits = done.reduce((sum, d) => sum + d.amount, 0);
        const pct = activePlan.totalUnits > 0 ? Math.round((completedUnits / activePlan.totalUnits) * 100) : 0;
        const today = s.find((d) => d.date === todayStr());
        return { pct, today };
      }, [activePlan]);

      if (loading) return <div className="min-h-screen flex items-center justify-center" style={{ background: C.ink }}><Loader2 className="animate-spin" color={C.gold} size={28} /></div>;

      return (
        <div dir="rtl" lang="ar" className="min-h-screen w-full" style={{ background: C.ink }}>
          <header className="px-5 py-4 flex items-center justify-between sticky top-0 z-30 border-b backdrop-blur-md" style={{ background: `${C.ink}E6`, borderColor: C.panelLighter }}>
            <div className="flex items-center gap-2.5">
              <Rub size={22} color={C.gold} />
              <h1 className="text-lg leading-none" style={{ color: C.goldSoft, fontFamily: "'Aref Ruqaa', serif" }}>خِطّة قرآنية</h1>
            </div>
          </header>

          <main className="max-w-2xl mx-auto px-4 pb-28 pt-4">
            {plans.length === 0 ? (
              <div className="flex flex-col items-center text-center py-20 gap-4">
                <Rub size={40} color={C.gold} />
                <h2 className="text-2xl" style={{ color: C.parchment, fontFamily: "'Aref Ruqaa', serif" }}>ابدأ خِطّتك الأولى</h2>
                <button onClick={() => setShowCreate(true)} className="flex items-center gap-2 rounded-full px-6 py-3 text-sm font-bold mt-2 transition hover:opacity-90 active:scale-95" style={{ background: C.gold, color: C.ink }}>
                  <Plus size={16} strokeWidth={3} /> إنشاء خطتي الأولى
                </button>
              </div>
            ) : (
              activePlan && stats && (
                <div className="space-y-4">
                  <section className="rounded-3xl p-6 flex items-center gap-5" style={{ background: C.panel, border: `1px solid ${C.panelLighter}` }}>
                    <ProgressRing pct={stats.pct} size={104} />
                    <div className="flex-1 min-w-0">
                      <h3 className="text-base font-semibold" style={{ color: C.parchment }}>{activePlan.title}</h3>
                      {stats.today ? (
                        <div className="mt-2">
                          <p className="text-sm font-bold" style={{ color: C.goldSoft }}>ورد اليوم: {halfPageMainLabel(stats.today.from, stats.today.to)}</p>
                          <div className="flex gap-2 mt-3">
                            <button onClick={() => updateDay(activePlan.id, stats.today.id, { status: "done" })} className="flex items-center gap-1 rounded-xl px-3 py-1.5 text-xs font-bold" style={{ background: C.sage, color: "#fff" }}><Check size={14} /> سمعت</button>
                            <button onClick={() => updateDay(activePlan.id, stats.today.id, { status: "missed" })} className="flex items-center gap-1 rounded-xl px-3 py-1.5 text-xs" style={{ background: C.brick, color: "#fff" }}><X size={14} /> لم أنجز</button>
                          </div>
                        </div>
                      ) : <p className="text-xs mt-2" style={{ color: C.muted }}>لا يوجد ورد اليوم</p>}
                    </div>
                  </section>
                </div>
              )
            )}
          </main>

          <nav className="fixed bottom-0 inset-x-0 z-30 border-t backdrop-blur-lg" style={{ background: `${C.ink}D9`, borderColor: C.panelLighter }}>
            <div className="max-w-xl mx-auto px-10 py-2.5 flex items-center justify-center">
              <button onClick={() => setShowCreate(true)} className="w-14 h-14 rounded-full flex items-center justify-center -mt-6 transition hover:scale-105 active:scale-95" style={{ background: C.gold, boxShadow: `0 4px 16px ${SHADOW}` }}>
                <Plus size={26} color={C.ink} strokeWidth={3} />
              </button>
            </div>
          </nav>

          {showCreate && <CreatePlanModal onClose={() => setShowCreate(false)} onCreate={createPlan} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<QuranKhittahApp />);
  </script>
</body>
</html>

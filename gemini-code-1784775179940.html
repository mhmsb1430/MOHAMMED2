    function reverseAdvance(surah, ayah, pages) {
      let s = surah; let a = ayah; let remaining = pages;
      while (remaining > 1e-9 && s >= 2) {
        const totalAyahS = SURAH_AYAH[s];
        const pagesOfS = SURAH_PAGES[s] || 0.0001;
        const ayahsPerPage = totalAyahS / pagesOfS;
        const remainingAyahInS = totalAyahS - a + 1;
        const remainingPagesInS = remainingAyahInS / ayahsPerPage;
        if (remainingPagesInS <= remaining + 1e-9) {
          remaining -= remainingPagesInS; s -= 1; a = 1;
        } else {
          const take = Math.max(1, Math.min(remainingAyahInS, Math.round(remaining * ayahsPerPage)));
          a += take; remaining = 0;
        }
      }
      if (s < 2) { s = 2; a = 1; }
      return { surah: s, ayah: a };
    }

    function reverseRetreat(surah, ayah) {
      if (ayah > 1) return { surah, ayah: ayah - 1 };
      const prevSurah = surah + 1;
      return { surah: prevSurah, ayah: SURAH_AYAH[prevSurah] || 1 };
    }

    function reversePagesConsumed(startSurah, curSurah, curAyah) {
      let total = 0;
      for (let s = startSurah; s > curSurah; s--) total += SURAH_PAGES[s];
      const pagesOfCur = SURAH_PAGES[curSurah] || 0.0001;
      total += (curAyah - 1) / (SURAH_AYAH[curSurah] / pagesOfCur);
      return total;
    }

    function surahRangeForPages(startSurah, totalPages) {
      const surahs = [];
      for (let s = startSurah; s >= 2; s--) surahs.push(s);
      const available = surahs.reduce((sum, s) => sum + SURAH_PAGES[s], 0);
      const targetPages = Math.min(totalPages, available);
      const next = reverseAdvance(startSurah, 1, targetPages);
      const end = reverseRetreat(next.surah, next.ayah);
      return { endSurah: end.surah, endAyah: end.ayah, pagesUsed: Math.round(targetPages) };
    }

    function pagesBetweenSurahs(fromSurah, toSurah) {
      const lo = Math.max(Math.min(fromSurah, toSurah), 2);
      const hi = Math.max(fromSurah, toSurah);
      let sum = 0;
      for (let s = lo; s <= hi; s++) sum += SURAH_PAGES[s];
      return Math.round(sum * 100) / 100;
    }

    function generateReverseSchedule({ totalUnits, durationDays, startDate, offDays, startSurah }) {
      const dates = buildDates(startDate, durationDays, offDays);
      const nDays = dates.length || 1;
      const surahs = [];
      for (let s = startSurah; s >= 2; s--) surahs.push(s);
      const available = surahs.reduce((sum, s) => sum + SURAH_PAGES[s], 0);
      const targetPages = Math.min(totalUnits, available);
      const totalHalf = Math.max(0, Math.round(targetPages * 2));
      const amounts = distributeUnits(totalHalf, nDays);
      const result = [];
      let curSurah = startSurah; let curAyah = 1; let accumPages = 0;

      dates.forEach((date, i) => {
        const halfAmount = amounts[i];
        if (halfAmount <= 0) return;
        if (curSurah <= 2 && curAyah >= SURAH_AYAH[2]) return;
        const pagesForDay = halfAmount / 2;
        const fromSurah = curSurah; const fromAyah = curAyah;
        const next = reverseAdvance(curSurah, curAyah, pagesForDay);
        const end = reverseRetreat(next.surah, next.ayah);
        result.push({ id: uid(), date, from: fromSurah, to: end.surah, fromAyah, toAyah: end.ayah, amount: Math.round((reversePagesConsumed(startSurah, next.surah, next.ayah) - accumPages) * 100) / 100, status: "pending", note: "" });
        curSurah = next.surah; curAyah = next.ayah;
        accumPages = reversePagesConsumed(startSurah, curSurah, curAyah);
      });

      if (result.length > 0) {
        const coveredDays = result.slice();
        const totalCovered = coveredDays.reduce((s, d) => s + d.amount, 0);
        if (totalCovered > 0) {
          const REVIEW_CHUNK = Math.max(0.5, Math.min(totalCovered, 1));
          let reviewOffset = 0;
          dates.forEach((date, i) => {
            if (amounts[i] > 0) return;
            const range = pageOffsetRange(coveredDays, reviewOffset % totalCovered, REVIEW_CHUNK);
            result.push({ id: uid(), date, from: range.from, to: range.to, amount: REVIEW_CHUNK, status: "pending", note: "", isReview: true });
            reviewOffset += REVIEW_CHUNK;
          });
          result.sort((a, b) => (a.date < b.date ? -1 : 1));
        }
      }
      return result;
    }

    function DayRow({ day, isToday, direction, onSetStatus, onNote }) {

    function PlanReportTable({ activePlan }) {
      const schedule = activePlan.schedule;
      if (!schedule || schedule.length === 0) return null;
      const direction = activePlan.direction;

      const rows = useMemo(() => {
        const byDate = new Map(schedule.map((d) => [d.date, d]));
        const start = new Date(schedule[0].date + "T00:00:00");
        const end = new Date(schedule[schedule.length - 1].date + "T00:00:00");
        const list = [];
        let cur = new Date(start);
        while (cur <= end) {
          const dateStr = toDateStr(cur);
          const dow = cur.getDay();
          if (byDate.has(dateStr)) {
            list.push({ type: "day", date: dateStr, day: byDate.get(dateStr) });
          } else if ((activePlan.offDays || []).includes(dow)) {
            list.push({ type: "off", date: dateStr });
          } else {
            list.push({ type: "gap", date: dateStr });
          }
          cur.setDate(cur.getDate() + 1);
        }
        return list;
      }, [schedule, activePlan.offDays]);

      const NAVY = "#0B3559"; const BLUE = "#1F5D93"; const CHIP_BG = "#DCEBF8";
      const th = { padding: "13px 8px", fontSize: 13, fontWeight: 700, textAlign: "center", whiteSpace: "nowrap", borderInlineStart: `1px solid rgba(255,255,255,0.3)` };
      const td = { padding: "10px 6px", textAlign: "center", verticalAlign: "middle", borderInlineStart: `1px solid ${CHIP_BG}` };
      const chip = { display: "inline-block", width: "100%", background: CHIP_BG, border: `1.5px solid ${BLUE}`, borderRadius: 9, padding: "7px 5px", fontSize: 11.5, fontWeight: 700, color: NAVY, lineHeight: 1.45 };
      const dashChip = { ...chip, background: "#F3F6FA", border: "1.5px solid #B9CEE1", color: "#7E93AA", fontWeight: 500 };
      const mainCell = (day) => direction === "reverse" ? trackLabel(direction, { from: day.from, to: day.to }) : halfPageMainLabel(day.from, day.to);

      return (
        <div style={{ background: "#fff", color: NAVY, borderRadius: 16, overflow: "hidden", border: `3px solid ${NAVY}` }}>
          <div style={{ background: NAVY, color: "#fff", padding: "20px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontWeight: 700, fontSize: 18 }}>خطة: {activePlan.title}</div>
              <div style={{ fontSize: 12.5, opacity: 0.9, marginTop: 3 }}>{activePlan.type} — {activePlan.direction === "reverse" ? "من النهاية" : "من البداية"}</div>
            </div>
            <div style={{ width: 44, height: 44, borderRadius: "50%", background: "rgba(255,255,255,0.12)", display: "flex", alignItems: "center", justifyContent: "center" }}><Rub size={24} color="#fff" /></div>
          </div>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead><tr style={{ background: BLUE, color: "#fff" }}><th style={th}>التاريخ</th><th style={th}>الحفظ</th><th style={th}>تثبيت</th><th style={th}>مراجعة</th><th style={th}>الحالة</th></tr></thead>
            <tbody>
              {rows.map((r, i) =>
                r.type === "off" ? (
                  <tr key={r.date} className="khittah-report-row"><td colSpan={5} style={{ background: "#CFE3F5", textAlign: "center", padding: "10px", fontSize: 12.5, fontWeight: 700, color: NAVY, borderTop: `1.5px solid ${BLUE}`, borderBottom: `1.5px solid ${BLUE}` }}>إجازة — {fmtDate(r.date)}</td></tr>
                ) : r.type === "gap" ? (
                  <tr key={r.date} className="khittah-report-row"><td colSpan={5} style={{ background: "#F3F6FA", textAlign: "center", padding: "9px", fontSize: 12, color: "#8697AC", borderTop: `1px dashed #C7D6E5`, borderBottom: `1px dashed #C7D6E5` }}>لا يوجد وِرد — {fmtDate(r.date)}</td></tr>
                ) : (
                  <tr key={r.date} className="khittah-report-row" style={{ background: i % 2 ? "#EAF2FA" : "#fff", borderBottom: `1px solid ${CHIP_BG}` }}>
                    <td style={{ ...td, whiteSpace: "nowrap", fontWeight: 700, color: NAVY, fontSize: 12.5 }}>{fmtDate(r.date)}</td>
                    <td style={td}><span style={chip}>{mainCell(r.day)}</span></td>
                    <td style={td}><span style={r.day.majorReview ? chip : dashChip}>{r.day.majorReview ? trackLabel(direction, r.day.majorReview) : "\u00A0"}</span></td>
                    <td style={td}><span style={r.day.minorReview ? chip : dashChip}>{r.day.minorReview ? trackLabel(direction, r.day.minorReview) : "\u00A0"}</span></td>
                    <td style={td}><span style={{ ...chip, background: r.day.status === "done" ? "#DFF3E9" : r.day.status === "missed" ? "#FBE4DE" : "transparent", border: `1.5px solid ${r.day.status === "done" ? "#3E9C6E" : r.day.status === "missed" ? "#D2664D" : "#B9CEE1"}`, color: r.day.status === "done" ? "#227A4F" : r.day.status === "missed" ? "#B14A32" : NAVY, fontWeight: 700 }}>{r.day.status === "done" ? "✓ تمّ" : r.day.status === "missed" ? "غياب" : "\u00A0"}</span></td>

            <span className="text-xs" style={{ color: C.muted }}>{doneCount}/{days.length}</span>
          </button>
          <p className="hidden print-only text-sm font-bold px-4 pt-3" style={{ color: C.parchment }}>{weekLabel}</p>
          <div className="px-2.5 pb-2.5 space-y-1.5 khittah-week-body" style={{ display: open ? "block" : "none" }}>
            {days.map((day) => <DayRow key={day.id} day={day} isToday={day.date === todayStr()} direction={direction} onSetStatus={onSetStatus} onNote={onNote} />)}
          </div>
        </div>
      );
    }

    function QuranKhittahApp() {
      const [plans, setPlans] = useState([]);
      const [activeId, setActiveId] = useState(null);
      const [loading, setLoading] = useState(true);
      const [showCreate, setShowCreate] = useState(false);
      const [saving, setSaving] = useState(false);
      const [view, setView] = useState("home");
      const [showReport, setShowReport] = useState(false);
      const [followedCodes, setFollowedCodes] = useState([]);
      const [followedPlans, setFollowedPlans] = useState({});
      const [showShareModal, setShowShareModal] = useState(false);
      const [showFollowModal, setShowFollowModal] = useState(false);
      const [followInput, setFollowInput] = useState("");
      const [followError, setFollowError] = useState("");
      const [followLoading, setFollowLoading] = useState(false);
      const [viewingFollowedCode, setViewingFollowedCode] = useState(null);
      const [role, setRole] = useState(null);
      const [showTeacherLogin, setShowTeacherLogin] = useState(false);
      const [teacherCodeInput, setTeacherCodeInput] = useState("");
      const [teacherLoginError, setTeacherLoginError] = useState("");

      useEffect(() => {
        (async () => {
          const [p, a, codes, savedRole] = await Promise.all([loadPlans(), loadActiveId(), loadFollowedCodes(), loadRole()]);
          setPlans(p);
          setActiveId(a && p.find((x) => x.id === a) ? a : p[0]?.id || null);
          setFollowedCodes(codes);
          setRole(savedRole);
          setLoading(false);
          const entries = await Promise.all(codes.map(async (c) => [c, await fetchSharedPlan(c)]));
          setFollowedPlans(Object.fromEntries(entries.filter(([, v]) => v)));
        })();
      }, []);

      const persist = useCallback(async (nextPlans, nextActive) => {
        setSaving(true);
        await savePlans(nextPlans);
        if (nextActive !== undefined) await saveActiveId(nextActive);
        setSaving(false);
      }, []);

      const activePlan = useMemo(() => plans.find((p) => p.id === activeId) || null, [plans, activeId]);

      const createPlan = (plan) => {
        const next = [...plans, plan];
        setPlans(next); setActiveId(plan.id); setShowCreate(false); persist(next, plan.id);
      };

      const deletePlan = (id) => {
        const next = plans.filter((p) => p.id !== id);
        setPlans(next);
        const nextActive = activeId === id ? next[0]?.id || null : activeId;
        setActiveId(nextActive); persist(next, nextActive);
      };

      const updateDay = (planId, dayId, patch) => {
        let updatedPlan = null;
        const next = plans.map((p) => {
          if (p.id !== planId) return p;
          updatedPlan = { ...p, schedule: p.schedule.map((d) => (d.id === dayId ? { ...d, ...patch } : d)) };
          return updatedPlan;
        });
        setPlans(next); persist(next);
        if (updatedPlan && updatedPlan.shareCode) pushSharedPlan(updatedPlan);
      };

      const planProgress = (p) => {
        const done = p.schedule.filter((d) => d.status === "done");
        const completedUnits = done.reduce((sum, d) => sum + d.amount, 0);
        return p.totalUnits > 0 ? Math.round((completedUnits / p.totalUnits) * 100) : 0;
      };

      const shareActivePlan = async () => {
        if (!activePlan) return;
        let plan = activePlan;
        if (!plan.shareCode) {
          plan = { ...plan, shareCode: genShareCode() };
          const next = plans.map((p) => (p.id === plan.id ? plan : p));
          setPlans(next); persist(next);
        }
        await pushSharedPlan(plan);
        setShowShareModal(true);
      };

      const addFollowedCode = async () => {
        const code = followInput.trim().toUpperCase();
        if (!code) return;
        setFollowError(""); setFollowLoading(true);
        const plan = await fetchSharedPlan(code);
        setFollowLoading(false);
        if (!plan) { setFollowError("ما لقينا خطة بهذا الرمز — تأكد منه مع الطالب."); return; }
        if (!followedCodes.includes(code)) {
          const next = [...followedCodes, code];
          setFollowedCodes(next); saveFollowedCodes(next);
        }
        setFollowedPlans((prev) => ({ ...prev, [code]: plan }));
        setFollowInput(""); setShowFollowModal(false);
      };

      const removeFollowedCode = (code) => {
        const next = followedCodes.filter((c) => c !== code);
        setFollowedCodes(next); saveFollowedCodes(next);
        setFollowedPlans((prev) => { const copy = { ...prev }; delete copy[code]; return copy; });
        if (viewingFollowedCode === code) setViewingFollowedCode(null);
      };

      const refreshFollowedPlan = async (code) => {
        const plan = await fetchSharedPlan(code);
        if (plan) setFollowedPlans((prev) => ({ ...prev, [code]: plan }));
      };

      const stats = useMemo(() => {
        if (!activePlan) return null;
        const s = activePlan.schedule;
        const done = s.filter((d) => d.status === "done");
        const missed = s.filter((d) => d.status === "missed");
        const completedUnits = done.reduce((sum, d) => sum + d.amount, 0);
        const pct = activePlan.totalUnits > 0 ? Math.round((completedUnits / activePlan.totalUnits) * 100) : 0;

        const sorted = [...s].sort((a, b) => (a.date < b.date ? 1 : -1));
        let streak = 0;
        for (const d of sorted) {
          if (d.date > todayStr()) continue;
          if (d.status === "done") streak++; else break;
        }

        const today = s.find((d) => d.date === todayStr());
        const weeks = [];
        for (let i = 0; i < s.length; i += 7) {
          const chunk = s.slice(i, i + 7);
          weeks.push({ name: `أسبوع ${weeks.length + 1}`, منجز: chunk.filter((d) => d.status === "done").length, متبقي: chunk.filter((d) => d.status !== "done").length });
        }

        return { total: s.length, doneCount: done.length, missedCount: missed.length, remaining: s.length - done.length - missed.length, completedUnits, pct, streak, today, weeks };
      }, [activePlan]);

      if (loading) return <div className="min-h-screen flex items-center justify-center" style={{ background: C.ink }}><Loader2 className="animate-spin" color={C.gold} size={28} /></div>;

      if (!role) {
        return (
          <div className="min-h-screen w-full flex flex-col items-center justify-center px-6" style={{ background: C.ink }} dir="rtl">
            <Rub size={36} color={C.gold} />
            <h1 className="text-2xl mt-4 mb-1" style={{ color: C.parchment, fontFamily: "'Aref Ruqaa', serif" }}>خِطّة</h1>
            <p className="text-sm mb-8 text-center" style={{ color: C.muted }}>هل تدخل كطالب أو كمعلم؟</p>
            <div className="w-full max-w-sm space-y-3">
              <button onClick={async () => { setRole("student"); saveRole("student"); }} className="w-full text-right rounded-2xl p-4 flex items-center gap-3.5" style={{ background: C.panel, border: `1.5px solid ${C.panelLighter}` }}>
                <div className="w-11 h-11 rounded-full flex items-center justify-center shrink-0" style={{ background: C.gold }}><BookOpen size={20} color="#fff" /></div>
                <div className="min-w-0">
                  <div className="text-sm font-bold" style={{ color: C.parchment }}>طالب</div>
                  <div className="text-xs mt-0.5" style={{ color: C.muted }}>أنشئ خططك وتابعها — بدون أي رمز</div>
                </div>
              </button>
              <button onClick={() => { setTeacherLoginError(""); setTeacherCodeInput(""); setShowTeacherLogin(true); }} className="w-full text-right rounded-2xl p-4 flex items-center gap-3.5" style={{ background: C.panel, border: `1.5px solid ${C.panelLighter}` }}>
                <div className="w-11 h-11 rounded-full flex items-center justify-center shrink-0" style={{ background: C.sage }}><RotateCcw size={20} color="#fff" /></div>
                <div className="min-w-0">
                  <div className="text-sm font-bold" style={{ color: C.parchment }}>معلم</div>
                  <div className="text-xs mt-0.5" style={{ color: C.muted }}>يحتاج رمز سري — تابع طلابك برمز المشاركة اللي يعطونك إياه</div>
                </div>
              </button>
            </div>

            {showTeacherLogin && (
              <div className="w-full max-w-sm mt-4 rounded-2xl p-5 khittah-fade" style={{ background: C.panel, border: `1.5px solid ${C.panelLighter}` }}>
                <label className="block text-sm mb-2" style={{ color: C.parchment }}>أدخل الرمز السري للمعلّمين</label>
                <input type="password" value={teacherCodeInput} onChange={(e) => setTeacherCodeInput(e.target.value)} placeholder="الرمز السري" className="w-full rounded-xl px-3.5 py-3 text-center text-sm outline-none mb-2" style={{ background: C.ink, color: C.parchment, border: `1.5px solid ${C.gold}` }} />
                {teacherLoginError && <p className="text-xs mb-2" style={{ color: C.brick }}>{teacherLoginError}</p>}
                <div className="flex gap-2 mt-2">
                  <button onClick={() => setShowTeacherLogin(false)} className="rounded-xl px-4 py-2.5 text-sm" style={{ background: "transparent", color: C.parchmentDim, border: `1px solid ${C.panelLighter}` }}>رجوع</button>
                  <button onClick={() => { if (teacherCodeInput.trim() === TEACHER_ACCESS_CODE) { setRole("teacher"); saveRole("teacher"); setShowTeacherLogin(false); setFollowError(""); setFollowInput(""); setShowFollowModal(true); } else { setTeacherLoginError("الرمز غير صحيح."); } }} className="flex-1 rounded-xl py-2.5 text-sm font-bold" style={{ background: C.gold, color: "#fff" }}>دخول</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      const hour = new Date().getHours();
      const greeting = hour < 5 ? "طاب ليلك" : hour < 12 ? "صباح الخير" : hour < 17 ? "طاب يومك" : hour < 20 ? "طاب مساؤك" : "طاب ليلك";
      const todayLong = new Date().toLocaleDateString("ar-SA", { weekday: "long", day: "numeric", month: "long" });

      return (
        <div dir="rtl" lang="ar" className="min-h-screen w-full" style={{ background: C.ink, backgroundImage: `radial-gradient(${C.panelLighter} 1px, transparent 1px)`, backgroundSize: "26px 26px" }}>
          <header className="px-5 py-4 flex items-center justify-between sticky top-0 z-30 no-print border-b backdrop-blur-md" style={{ background: `${C.ink}E6`, borderColor: C.panelLighter }}>
            <div className="flex items-center gap-2.5">
              <Rub size={22} color={C.gold} />
              <div>
                <h1 className="text-lg leading-none" style={{ color: C.goldSoft, fontFamily: "'Aref Ruqaa', serif" }}>خِطّة</h1>
                <p className="text-[11px] mt-0.5" style={{ color: C.muted }}>{greeting} — {todayLong}<span className="mx-1" style={{ opacity: 0.4 }}>•</span><span style={{ color: C.goldDim }}>{BUILD_TAG}</span></p>
              </div>
            </div>
          </header>

          <main className="max-w-2xl mx-auto px-4 pb-28">
            <div key={view} className="khittah-view-fade">
            {view === "plans" || role === "teacher" ? (
              <div className="pt-5">
                <h2 className="text-xl mb-4" style={{ color: C.parchment, fontFamily: "'Aref Ruqaa', serif" }}>خططي</h2>
                {plans.length === 0 ? (
                  <p className="text-sm text-center py-16" style={{ color: C.muted }}>لا توجد خطط بعد. اضغط + بالأسفل لإنشاء أول خطة.</p>
                ) : (
                  <div className="space-y-3">
                    {plans.map((p) => {
                      const pct = planProgress(p); const isActive = p.id === activeId;
                      return (
                        <button key={p.id} onClick={() => { setActiveId(p.id); persist(plans, p.id); setView("home"); }} className="w-full text-right rounded-2xl p-4 flex items-center gap-3.5 transition hover:border-gold" style={{ background: isActive ? C.panelLight : C.panel, border: `1px solid ${isActive ? C.gold : C.panelLighter}` }}>
                          <ProgressRing pct={pct} size={44} />
                          <div className="min-w-0 flex-1">
                            <div className="text-sm font-bold truncate" style={{ color: isActive ? C.goldSoft : C.parchment }}>{p.title}</div>
                            <div className="text-xs mt-1" style={{ color: C.muted }}>{p.type} • {p.direction === "reverse" ? "من النهاية" : "من البداية"}</div>
                          </div>
                          {isActive && <span className="text-[10px] px-2 py-1 rounded-full shrink-0" style={{ background: C.panelLighter, color: C.goldSoft }}>نشطة</span>}
                        </button>
                      );
                    })}
                  </div>
                )}

                <div className="flex items-center justify-between mt-8 mb-3">
                  <h2 className="text-xl" style={{ color: C.parchment, fontFamily: "'Aref Ruqaa', serif" }}>متابعة الطلاب</h2>
                  <button onClick={() => { setFollowError(""); setFollowInput(""); setShowFollowModal(true); }} className="flex items-center gap-1 rounded-full px-3 py-1.5 text-xs font-bold transition hover:opacity-80" style={{ background: C.gold, color: C.ink }}>
                    <Plus size={13} strokeWidth={3} /> إضافة طالب
                  </button>
                </div>
                {followedCodes.length === 0 ? (
                  <p className="text-sm text-center py-8" style={{ color: C.muted }}>ما تتابع أي طالب بعد. اضغط "إضافة طالب" وأدخل رمز المشاركة اللي عطاك إياه.</p>
                ) : (
                  <div className="space-y-3">
                    {followedCodes.map((code) => {
                      const sp = followedPlans[code];
                      if (!sp) return <div key={code} className="rounded-2xl p-4 text-xs" style={{ background: C.panel, border: `1px solid ${C.panelLighter}`, color: C.muted }}>تعذّر تحميل خطة الرمز {code}</div>;
                      const pct = sp.totalUnits > 0 ? Math.round((sp.schedule.filter((d) => d.status === "done").reduce((s, d) => s + d.amount, 0) / sp.totalUnits) * 100) : 0;
                      return (
                        <button key={code} onClick={async () => { await refreshFollowedPlan(code); setViewingFollowedCode(code); }} className="w-full text-right rounded-2xl p-4 flex items-center gap-3.5 transition hover:bg-white/5" style={{ background: C.panel, border: `1px solid ${C.panelLighter}` }}>
                          <ProgressRing pct={pct} size={44} />
                          <div className="min-w-0 flex-1">
                            <div className="text-sm font-bold truncate" style={{ color: C.parchment }}>{sp.title}</div>
                            <div className="text-xs mt-1" style={{ color: C.muted }}>{sp.type} • رمز {code}</div>
                          </div>
                          <span onClick={(e) => { e.stopPropagation(); removeFollowedCode(code); }} className="p-1.5 shrink-0 transition hover:scale-110"><X size={15} color={C.brick} /></span>
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            ) : plans.length === 0 ? (
              <div className="flex flex-col items-center text-center py-20 gap-4">
                <div className="relative flex items-center justify-center mb-1" style={{ width: 96, height: 96 }}>
                  <div className="absolute inset-0 rounded-full" style={{ border: `1.5px solid ${C.panelLighter}` }} />
                  <div className="absolute rounded-full flex items-center justify-center" style={{ inset: 10, background: C.gold }}><Rub size={30} color="#fff" /></div>
                </div>
                <h2 className="text-2xl" style={{ color: C.parchment, fontFamily: "'Aref Ruqaa', serif" }}>ابدأ خِطّتك الأولى</h2>
                <p className="text-sm max-w-xs leading-6" style={{ color: C.muted }}>حدّد هدفك — حفظ أو مراجعة — وسنبني لك جدولًا يوميًا مبنيًا على مصحف المدينة الحقيقي، صفحة بصفحة أو نصف صفحة.</p>
                <button onClick={() => setShowCreate(true)} className="flex items-center gap-2 rounded-full px-6 py-3 text-sm font-bold mt-2 transition hover:opacity-90 active:scale-95" style={{ background: C.gold, color: C.ink }}>
                  <Plus size={16} strokeWidth={3} /> إنشاء خطتي الأولى
                </button>
              </div>
            ) : (
              <>
                {activePlan && stats && (
                  <>
                    <section className="mt-5 rounded-3xl p-6 flex items-center gap-5" style={{ background: C.panel, border: `1px solid ${C.panelLighter}` }}>
                      <ProgressRing pct={stats.pct} size={104} />
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-1.5 mb-1.5">
                          <span className="text-[11px] px-2 py-0.5 rounded-full" style={{ background: C.panelLighter, color: C.goldSoft }}>{activePlan.type}</span>
                          <span className="text-[11px]" style={{ color: C.muted }}>{activePlan.title}</span>
                        </div>
                        {stats.today ? (
                          <>
                            {stats.today.majorReview && <div className="flex items-center gap-1.5 text-[11px] mb-1.5" style={{ color: C.goldSoft }}><Layers size={11} /> تثبيت (قبل الحفظ) — {trackLabel(activePlan.direction, stats.today.majorReview)}</div>}
                            <h3 className="text-base font-semibold" style={{ color: C.parchment }}>
                              {stats.today.isReview && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full ml-1.5" style={{ background: C.sage, color: "#fff" }}>مراجعة</span>}
                              {activePlan.direction === "reverse" ? (() => { const wholeRange = (stats.today.fromAyah || 1) === 1 && (stats.today.toAyah || SURAH_AYAH[stats.today.to]) === SURAH_AYAH[stats.today.to]; if (stats.today.from === stats.today.to) return wholeRange ? `اليوم: سورة ${SURAH_NAMES[stats.today.from]}` : `اليوم: سورة ${SURAH_NAMES[stats.today.from]} — آية ${stats.today.fromAyah} إلى ${stats.today.toAyah}`; return wholeRange ? `اليوم: من سورة ${SURAH_NAMES[stats.today.from]} إلى سورة ${SURAH_NAMES[stats.today.to]}` : `اليوم: من سورة ${SURAH_NAMES[stats.today.from]} إلى سورة ${SURAH_NAMES[stats.today.to]} (آية ${stats.today.toAyah})`; })() : `اليوم: ${halfPageMainLabel(stats.today.from, stats.today.to)}`}
                            </h3>
                            <p className="text-xs mt-1" style={{ color: C.muted }}>{activePlan.direction === "reverse" ? reverseRangeLabel(stats.today.from, stats.today.to, stats.today.fromAyah, stats.today.toAyah) : `${halfPageRangeLabel(stats.today.from, stats.today.to)} • ${juzLabel(pageOfHp(stats.today.from), pageOfHp(stats.today.to))`}</p>
                            {stats.today.minorReview && <div className="mt-2 space-y-1"><div className="flex items-center gap-1.5 text-[11px]" style={{ color: C.sage }}><RotateCcw size={11} /> مراجعة صغرى — {trackLabel(activePlan.direction, stats.today.minorReview)}</div></div>}
                            <div className="flex gap-2 mt-4 no-print">
                              <button onClick={() => updateDay(activePlan.id, stats.today.id, { status: "done" })} className="flex items-center gap-1.5 rounded-xl px-4 py-2.5 text-xs font-bold transition hover:opacity-90 active:scale-95" style={{ background: C.sage, color: "#fff" }}><Check size={14} strokeWidth={3} /> سمعت اليوم</button>
                              <button onClick={() => updateDay(activePlan.id, stats.today.id, { status: "missed" })} className="flex items-center gap-1.5 rounded-xl px-4 py-2.5 text-xs transition hover:bg-white/5 active:scale-95" style={{ background: "transparent", color: C.muted, border: `1px solid ${C.panelLighter}` }}><X size={14} /> لم أنجز</button>
                            </div>
                          </>
                        ) : <p className="text-sm mt-2" style={{ color: C.muted }}>لا يوجد وِرد مجدوَل لليوم — إما إجازة أو خارج مدة الخطة.</p>}
                      </div>
                    </section>

                    <p className="text-[11px] font-bold tracking-wide mt-7 mb-2 uppercase" style={{ color: C.goldSoft }}>الإحصائيات</p>
                    <section className="grid grid-cols-4 gap-2.5">
                      {[{ icon: <BookOpen size={16} color={C.gold} />, label: activePlan.direction === "reverse" ? "سور متبقية" : "صفحات متبقية", value: activePlan.totalUnits - stats.completedUnits }, { icon: <TrendingUp size={16} color={C.gold} />, label: "أيام منجزة", value: stats.doneCount }, { icon: <Flame size={16} color={C.gold} />, label: "التتابع", value: stats.streak }, { icon: <Calendar size={16} color={C.gold} />, label: "أيام متبقية", value: stats.remaining }].map((s, i) => (
                        <div key={i} className="rounded-2xl p-3.5 text-center transition hover:border-gold" style={{ background: C.panel, border: `1px solid ${C.panelLighter}` }}>
                          <div className="flex justify-center mb-1.5">{s.icon}</div>
                          <div className="text-xl font-bold" style={{ color: C.parchment, fontFamily: "'Aref Ruqaa', serif" }}>{s.value}</div>
                          <div className="text-[10px] mt-1" style={{ color: C.muted }}>{s.label}</div>
                        </div>
                      ))}
                    </section>

                    {stats.weeks.length > 1 && (
                      <section className="mt-7 rounded-2xl p-5" style={{ background: C.panel, border: `1px solid ${C.panelLighter}` }}>
                        <h4 className="text-sm font-medium mb-4" style={{ color: C.parchmentDim }}>التقدّم الأسبوعي</h4>
                        <div style={{ width: "100%", height: 160 }}>
                          <ResponsiveContainer>
                            <BarChart data={stats.weeks}>
                              <CartesianGrid strokeDasharray="3 3" stroke={C.panelLighter} vertical={false} />
                              <XAxis dataKey="name" tick={{ fill: C.muted, fontSize: 10 }} axisLine={{ stroke: C.panelLighter }} tickLine={false} />
                              <YAxis tick={{ fill: C.muted, fontSize: 10 }} axisLine={false} tickLine={false} allowDecimals={false} />
                              <Tooltip contentStyle={{ background: C.ink, border: `1px solid ${C.panelLighter}`, borderRadius: 12, fontSize: 12 }} labelStyle={{ color: C.goldSoft }} />
                              <Bar dataKey="منجز" stackId="a" fill={C.sage} radius={[4, 4, 0, 0]} />
                              <Bar dataKey="متبقي" stackId="a" fill={C.panelLighter} radius={[4, 4, 0, 0]} />
                            </BarChart>
                          </ResponsiveContainer>
                        </div>
                      </section>
                    )}

                    <Divider />

                    <section className="mt-4 space-y-3">
                      <div className="hidden print-only"><PlanReportTable activePlan={activePlan} /></div>
                      <div className="flex items-center justify-between mb-2 px-1 no-print flex-wrap gap-y-2">
                        <h4 className="text-[11px] font-bold tracking-wide" style={{ color: C.goldSoft }}>جدول الخطة الكامل</h4>
                        <div className="flex items-center gap-3 flex-wrap">
                          <button onClick={shareActivePlan} className="flex items-center gap-1.5 text-[11px] transition hover:opacity-80" style={{ color: C.goldSoft }}><Share2 size={13} /> {activePlan.shareCode ? "رمز المشاركة" : "مشاركة مع معلم"}</button>
                          <button onClick={() => setShowReport(true)} className="flex items-center gap-1.5 text-[11px] transition hover:opacity-80" style={{ color: C.goldSoft }}><Eye size={13} /> معاينة</button>
                          <button onClick={() => window.print()} className="flex items-center gap-1.5 text-[11px] transition hover:opacity-80" style={{ color: C.goldSoft }}><FileDown size={13} /> تحميل PDF</button>
                          <button onClick={() => deletePlan(activePlan.id)} className="flex items-center gap-1.5 text-[11px] transition hover:opacity-80" style={{ color: C.brick }}><Trash2 size={13} /> حذف الخطة</button>
                        </div>
                      </div>
                      <div className="no-print space-y-3">
                        {(() => {
                          const schedule = activePlan.schedule; const weeks = [];
                          for (let i = 0; i < schedule.length; i += 7) weeks.push(schedule.slice(i, i + 7));
                          const todayWeekIdx = weeks.findIndex((w) => w.some((d) => d.date === todayStr()));
                          const firstPendingWeekIdx = weeks.findIndex((w) => w.some((d) => d.status === "pending"));
                          const openIdx = todayWeekIdx >= 0 ? todayWeekIdx : firstPendingWeekIdx >= 0 ? firstPendingWeekIdx : 0;
                          return weeks.map((weekDays, i) => (
                            <WeekGroup key={`${activePlan.id}-week-${i}`} weekLabel={`الأسبوع ${i + 1} — ${fmtDate(weekDays[0].date)}`} days={weekDays} direction={activePlan.direction} defaultOpen={i === openIdx} onSetStatus={(id, status) => updateDay(activePlan.id, id, { status })} onNote={(id, note) => updateDay(activePlan.id, id, { note })} />
                          ));
                        })()}
                      </div>
                    </section>
                  </>
                )}
              </>
            )}
            </div>
          </main>

          {showReport && activePlan && (
            <div className="fixed inset-0 z-50 overflow-y-auto no-print khittah-view-fade" style={{ background: "#EAF2FB" }} dir="rtl">
              <div className="px-5 py-4 flex items-center justify-between sticky top-0 z-10" style={{ background: "#fff", borderBottom: "1px solid #CFDFEF" }}>
                <h2 className="text-lg font-bold" style={{ color: "#16283B" }}>معاينة التقرير</h2>
                <div className="flex items-center gap-2">
                  <button onClick={() => window.print()} className="flex items-center gap-1.5 rounded-xl px-4 py-2 text-xs font-bold" style={{ background: "#2C6CA3", color: "#fff" }}><FileDown size={14} /> تحميل PDF</button>
                  <button onClick={() => setShowReport(false)} className="p-2 rounded-xl hover:bg-black/5" aria-label="إغلاق"><X size={20} color="#54697E" /></button>
                </div>
              </div>
              <div className="max-w-2xl mx-auto p-4"><PlanReportTable activePlan={activePlan} /></div>
            </div>
          )}

          {showFollowModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-5 no-print" style={{ background: "rgba(2,10,18,0.7)" }} dir="rtl">
              <div className="w-full max-w-sm rounded-3xl p-6" style={{ background: C.panel, border: `1px solid ${C.panelLighter}` }}>
                <h3 className="text-lg font-bold mb-1" style={{ color: C.parchment }}>إضافة طالب</h3>
                <p className="text-xs mb-4" style={{ color: C.muted }}>أدخل رمز المشاركة اللي عطاك إياه الطالب.</p>
                <input value={followInput} onChange={(e) => setFollowInput(e.target.value.toUpperCase())} placeholder="مثال: K7X2QF" className="w-full rounded-2xl px-4 py-4 text-center text-lg font-bold tracking-[0.2em] outline-none mb-3 transition focus:border-gold" style={{ background: C.ink, color: C.parchment, border: `1.5px solid ${C.gold}` }} />
                {followError && <p className="text-xs mb-3" style={{ color: C.brick }}>{followError}</p>}
                <div className="flex gap-2">
                  <button onClick={() => setShowFollowModal(false)} className="rounded-xl px-4 py-3 text-sm font-medium transition hover:bg-white/5" style={{ background: "transparent", color: C.parchmentDim, border: `1px solid ${C.panelLighter}` }}>إلغاء</button>
                  <button disabled={!followInput.trim() || followLoading} onClick={addFollowedCode} className="flex-1 rounded-xl py-3 text-sm font-bold transition disabled:opacity-40" style={{ background: C.gold, color: C.ink }}>{followLoading ? "جارِ البحث..." : "إضافة"}</button>
                </div>
              </div>
            </div>
          )}

          {viewingFollowedCode && followedPlans[viewingFollowedCode] && (
            <div className="fixed inset-0 z-50 overflow-y-auto no-print khittah-view-fade" style={{ background: C.ink }} dir="rtl">
              <div className="px-5 py-4 flex items-center justify-between sticky top-0 z-10 border-b backdrop-blur-md" style={{ background: `${C.ink}E6`, borderColor: C.panelLighter }}>
                <div>
                  <h2 className="text-lg font-bold" style={{ color: C.parchment }}>{followedPlans[viewingFollowedCode].title}</h2>
                  <p className="text-[11px]" style={{ color: C.muted }}>عرض فقط — رمز {viewingFollowedCode}</p>
                </div>
                <button onClick={() => setViewingFollowedCode(null)} className="p-2 rounded-xl hover:bg-white/5 transition" aria-label="إغلاق"><X size={20} color={C.muted} /></button>
              </div>
              <div className="max-w-2xl mx-auto p-4"><PlanReportTable activePlan={followedPlans[viewingFollowedCode]} /></div>
            </div>
          )}

          {showShareModal && activePlan && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-5 no-print" style={{ background: "rgba(2,10,18,0.7)" }} dir="rtl">
              <div className="w-full max-w-sm rounded-3xl p-6 text-center" style={{ background: C.panel, border: `1px solid ${C.panelLighter}` }}>
                <Share2 size={32} color={C.gold} className="mx-auto mb-4" />
                <h3 className="text-lg font-bold mb-1" style={{ color: C.parchment }}>رمز مشاركة الخطة</h3>
                <p className="text-xs mb-5 leading-relaxed" style={{ color: C.muted }}>أعط هذا الرمز لمعلّمك ليتابع خطتك مباشرة. يتحدّث تلقائيًا كل ما تحدّث تقدّمك.</p>
                <div className="text-3xl font-extrabold tracking-[0.3em] rounded-2xl py-5 mb-5" style={{ background: C.panelLight, color: C.goldSoft, border: `1px dashed ${C.goldDim}` }}>{activePlan.shareCode}</div>
                <div className="flex gap-2">
                  <button onClick={() => { try { navigator.clipboard.writeText(activePlan.shareCode); } catch {} }} className="flex-1 rounded-xl py-3 text-sm font-bold transition hover:opacity-90" style={{ background: C.gold, color: C.ink }}>نسخ الرمز</button>
                  <button onClick={() => setShowShareModal(false)} className="flex-1 rounded-xl py-3 text-sm font-medium transition hover:bg-white/5" style={{ background: "transparent", color: C.parchmentDim, border: `1px solid ${C.panelLighter}` }}>إغلاق</button>
                </div>
              </div>
            </div>
          )}

          <nav className="fixed bottom-0 inset-x-0 z-30 no-print border-t backdrop-blur-lg" style={{ background: `${C.ink}D9`, borderColor: C.panelLighter }}>
            <div className="max-w-xl mx-auto px-10 py-2.5 flex items-center justify-between">
              <button onClick={() => setView("home")} className="flex flex-col items-center gap-1.5 px-4 py-1 transition hover:opacity-80" style={{ color: view === "home" ? C.gold : C.muted }}>
                <Home size={22} />
                <span className="text-[10px] font-bold">الرئيسية</span>
              </button>
              <button onClick={() => { if (role === "teacher") { setFollowError(""); setFollowInput(""); setShowFollowModal(true); } else { setShowCreate(true); } }} className="w-14 h-14 rounded-full flex items-center justify-center -mt-8 transition hover:scale-105 active:scale-95" style={{ background: C.gold, boxShadow: `0 4px 16px ${SHADOW}` }} aria-label={role === "teacher" ? "إضافة طالب" : "خطة جديدة"}>
                <Plus size={26} color={C.ink} strokeWidth={3} />
              </button>
              <button onClick={() => setView("plans")} className="flex flex-col items-center gap-1.5 px-4 py-1 transition hover:opacity-80" style={{ color: view === "plans" ? C.gold : C.muted }}>
                <BookOpen size={22} />
                <span className="text-[10px] font-bold">خططي</span>
              </button>
            </div>
          </nav>

          {saving && (
            <div className="fixed bottom-24 left-4 flex items-center gap-2 text-[11px] px-3.5 py-2 rounded-full no-print shadow-lg" style={{ background: C.panelLight, color: C.parchmentDim, border: `1px solid ${C.panelLighter}` }}>
              <Loader2 size={12} className="animate-spin" /> جارِ الحفظ...
            </div>
          )}

          {showCreate && <CreatePlanModal onClose={() => setShowCreate(false)} onCreate={createPlan} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<QuranKhittahApp />);
  </script>
</body>
</html>
